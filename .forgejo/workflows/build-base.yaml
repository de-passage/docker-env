name: build-base

on:
  push:
    branches:
      - master
    paths:
      - 'docker/arch/**'
      - '.forgejo/workflows/build-base.yaml'
  workflow_call:
    inputs:
      tag:
        required: false
        type: string
        default: ""
      base_tag:
        required: false
        type: string
        default: "nightly"
  workflow_dispatch:
    inputs:
      tag:
        required: false
        type: string
        default: ""
      base_tag:
        required: false
        type: string
        default: "nightly"

jobs:
  build:
    runs-on: docker
    container:
      image: git.sylvainleclercq.com/depassage/ci-node-docker:22-bookworm

    steps:
      - uses: actions/checkout@v4

      - name: Compute tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "IMAGE_TAG=${{ inputs.tag }}" >> "$FORGEJO_ENV"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "IMAGE_TAG=nightly" >> "$FORGEJO_ENV"
          else
            echo "IMAGE_TAG=${{ github.sha }}" >> "$FORGEJO_ENV"
          fi

      - name: Login to registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login git.sylvainleclercq.com -u depassage --password-stdin

      - name: Build base
        run: docker build -t git.sylvainleclercq.com/depassage/coder-base:${IMAGE_TAG} -f docker/arch/Dockerfile docker/arch

      - name: Push base
        run: docker push git.sylvainleclercq.com/depassage/coder-base:${IMAGE_TAG}

      - name: Also push nightly on push/schedule/manual
        if: ${{ inputs.tag == '' }}
        run: |
          docker tag git.sylvainleclercq.com/depassage/coder-base:${IMAGE_TAG} git.sylvainleclercq.com/depassage/coder-base:nightly
          docker push git.sylvainleclercq.com/depassage/coder-base:nightly
